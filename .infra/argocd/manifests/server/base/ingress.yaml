apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claycosmos-server
  labels:
    app.kubernetes.io/name: claycosmos
    app.kubernetes.io/component: server
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.claycosmos.ai
      secretName: claycosmos-server-tls
  rules:
    - host: api.claycosmos.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claycosmos-server
                port:
                  number: 80
