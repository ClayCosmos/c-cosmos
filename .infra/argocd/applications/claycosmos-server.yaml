apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claycosmos-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: claycosmos
    app.kubernetes.io/component: server
    environment: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: claycosmos

  source:
    repoURL: https://github.com/ClayCosmos/c-cosmos.git
    targetRevision: main
    path: .infra/argocd/manifests/server/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: claycosmos

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10
