apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: claycosmos-web

namespace: claycosmos

labels:
  - pairs:
      app.kubernetes.io/name: claycosmos
      app.kubernetes.io/component: web
      app.kubernetes.io/managed-by: argocd

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

images:
  - name: ghcr.io/claycosmos/claycosmos-web
    newTag: latest
